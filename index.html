<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Resale Tracker · Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1d4ed8;--blue2:#2563eb;--blue3:#3b82f6;--blue-light:#eff6ff;--blue-pale:#dbeafe;
  --navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
  --text:#0f172a;--text2:#334155;--text3:#64748b;--text4:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --gold:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.header{background:var(--blue);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:#fff;letter-spacing:.06em;font-style:italic}
.brand span{font-style:normal;font-weight:600}
.header-sub{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.15em;margin-top:2px}

/* ── Grand totals ── */
.grand-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));background:var(--navy);gap:1px}
.gc{background:var(--navy2);padding:14px 20px}
.gc-label{font-size:9px;letter-spacing:.15em;color:#94a3b8;text-transform:uppercase;margin-bottom:4px}
.gc-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#fff}
.gc-val.blue{color:#93c5fd}
.gc-val.green{color:#86efac}
.gc-val.red{color:#fca5a5}

/* ── Nav ── */
.nav{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 28px;display:flex;overflow-x:auto}
.nav-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:.04em;padding:14px 18px;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.nav-btn:hover{color:var(--blue2)}

.content{padding:24px 28px;max-width:1100px}

/* ── Year tabs ── */
.ytabs{display:flex;gap:6px;margin-bottom:20px}
.ybtn{font-size:12px;font-weight:500;padding:6px 18px;background:var(--bg2);color:var(--text3);border:1.5px solid var(--border2);cursor:pointer;border-radius:6px;transition:all .15s}
.ybtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── Summary cards ── */
.sum-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.scard{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:14px 18px}
.scard-label{font-size:10px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.scard-val{font-size:22px;font-weight:600;color:var(--text)}
.scard-val.blue{color:var(--blue)}
.scard-val.green{color:var(--green)}
.scard-val.red{color:var(--red)}

/* ── Bar chart ── */
.chart-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.chart-box-title{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:11px;font-weight:500;color:var(--text2);min-width:54px;text-align:right}
.bar-group{flex:1;display:flex;flex-direction:column;gap:3px}
.bar-track{height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;display:flex}
.bar-profit{background:var(--blue3);height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .4s}
.bar-expense{background:#fca5a5;height:100%;border-radius:4px}
.bar-net-track{height:14px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-net{height:100%;border-radius:3px}
.bar-net.pos{background:#86efac}
.bar-net.neg{background:#fca5a5}
.bar-nums{display:flex;gap:10px;font-size:10px;margin-top:2px}
.bn-profit{color:var(--blue2)}
.bn-expense{color:var(--red)}
.bn-net{font-weight:600}
.bn-net.pos{color:var(--green)}
.bn-net.neg{color:var(--red)}
.chart-legend{display:flex;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.cleg{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:5px}
.cleg-dot{width:10px;height:10px;border-radius:2px}

/* ── Monthly table ── */
.month-tbl{width:100%;border-collapse:collapse;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.month-tbl th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 16px;text-align:right;background:var(--bg3);border-bottom:1.5px solid var(--border)}
.month-tbl th:first-child{text-align:left}
.month-tbl td{font-size:13px;padding:11px 16px;text-align:right;border-top:1px solid var(--border)}
.month-tbl td:first-child{text-align:left;font-weight:500}
.month-tbl tr:hover td{background:var(--blue-light)}
.month-tbl tfoot td{font-weight:600;background:var(--bg3);border-top:2px solid var(--border2)}

/* ── Transaction table ── */
.txn-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:auto;margin-bottom:20px}
.txn-tbl{width:100%;border-collapse:collapse;min-width:700px}
.txn-tbl thead th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 12px;text-align:right;background:var(--bg3);border-bottom:1.5px solid var(--border);white-space:nowrap}
.txn-tbl thead th:first-child{text-align:left}
.txn-tbl tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.txn-tbl tbody tr:hover{background:var(--blue-light)}
.txn-tbl td{font-size:12px;padding:10px 12px;text-align:right;vertical-align:middle}
.txn-tbl td:first-child{text-align:left}
.iname{font-size:13px;font-weight:500;color:var(--text)}
.isub{font-size:10px;color:var(--text4);margin-top:1px}
.tag{font-size:9px;font-weight:600;letter-spacing:.08em;padding:2px 7px;border-radius:4px}
.tag-bag{color:#92400e;background:#fef3c7;border:1px solid #fde68a}
.tag-watch{color:#1e40af;background:#dbeafe;border:1px solid #bfdbfe}
.tag-acc{color:#6b21a8;background:#f3e8ff;border:1px solid #e9d5ff}
.s-sold{font-size:9px;font-weight:600;padding:2px 8px;border:1.5px solid var(--green);color:var(--green);border-radius:4px;background:var(--green-bg)}
.s-hold{font-size:9px;font-weight:600;padding:2px 8px;border:1.5px solid var(--border2);color:var(--text4);border-radius:4px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text4)}
.del-btn{background:none;border:none;color:var(--border2);cursor:pointer;font-size:13px;padding:3px 6px;border-radius:4px;transition:all .15s}
.del-btn:hover{color:var(--red);background:var(--red-bg)}
.mth-sep td{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);padding:6px 12px;background:var(--blue-pale);border-top:1px solid var(--border)}
.txn-tbl tfoot td{font-size:12px;font-weight:600;padding:10px 12px;text-align:right;border-top:2px solid var(--border2);background:var(--bg3)}
.txn-tbl tfoot td:first-child{text-align:left;font-size:10px;color:var(--text3);font-weight:400;letter-spacing:.08em;text-transform:uppercase}

/* ── Inline edit ── */
.editable{cursor:pointer;border-bottom:1px dashed transparent;transition:border .15s;padding:2px 4px;border-radius:3px}
.editable:hover{border-bottom-color:var(--blue3);background:var(--blue-pale)}
.inline-input{font-family:'Inter',sans-serif;font-size:12px;width:100px;padding:3px 6px;border:1.5px solid var(--blue3);border-radius:4px;background:#fff;color:var(--text);outline:none}
.inline-input:focus{box-shadow:0 0 0 2px var(--blue-pale)}

/* ── Toolbar / Form ── */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.btn-blue{font-size:12px;font-weight:500;padding:8px 18px;background:var(--blue);color:#fff;border:none;cursor:pointer;border-radius:6px;transition:background .15s}
.btn-blue:hover{background:var(--blue2)}
.btn-out{font-size:12px;font-weight:500;padding:8px 18px;background:#fff;color:var(--text2);border:1.5px solid var(--border2);cursor:pointer;border-radius:6px;transition:all .15s}
.btn-out:hover{border-color:var(--blue);color:var(--blue)}
.form-box{background:var(--bg2);border:1.5px solid var(--blue-pale);border-radius:10px;padding:18px;margin-bottom:14px;display:none}
.form-box.open{display:block}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.field input,.field select{font-family:'Inter',sans-serif;font-size:13px;background:#fff;border:1.5px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:6px;width:100%}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue3);box-shadow:0 0 0 3px var(--blue-pale)}
select option{background:#fff}
.fa{display:flex;gap:8px;justify-content:flex-end}
.edit-hint{font-size:10px;color:var(--text4);margin-bottom:10px}
.edit-hint span{color:var(--blue);font-weight:500}

/* ── Vertical bar chart ── */
.vchart-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;overflow-x:auto}
.vchart-title{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:16px}
.vchart-inner{display:flex;align-items:flex-end;gap:6px;height:200px;padding-bottom:28px;position:relative;min-width:500px}
.vchart-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
.vchart-bar-space{flex:1;display:flex;align-items:flex-end;width:100%}
.vchart-bar{width:100%;border-radius:4px 4px 0 0;transition:opacity .15s;position:relative;cursor:default}
.vchart-bar:hover{opacity:.8}
.vchart-bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--text3);white-space:nowrap}
.vchart-bar-label{font-size:9px;color:var(--text3);margin-top:4px;text-align:center;transform:rotate(-30deg);transform-origin:center;white-space:nowrap}
.vchart-yline{position:absolute;left:0;right:0;border-top:1px dashed var(--border2);pointer-events:none}
.vchart-yval{position:absolute;left:0;font-size:8px;color:var(--text4);transform:translateY(-50%)}
/* ── Filter buttons ── */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fbtn{font-size:11px;font-weight:500;padding:5px 14px;background:var(--bg2);color:var(--text3);border:1.5px solid var(--border2);cursor:pointer;border-radius:20px;transition:all .15s}
.fbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.fbtn.hold-active{background:#d97706;color:#fff;border-color:#d97706}
/* ── Accordion month header ── */
.mth-acc{cursor:pointer;user-select:none}
.mth-acc:hover td{background:#e0e7ff!important}
.mth-acc td{display:flex;align-items:center;justify-content:space-between;gap:8px}
.acc-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.acc-arrow.open{transform:rotate(90deg)}
/* scrollbar */
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="brand"><span>Luxury</span> Resale · Tracker</div>
    <div class="header-sub">PORTFOLIO MANAGEMENT SYSTEM · ONLINE SYNC</div>
  </div>
</div>

<div class="grand-bar" id="grand-bar"></div>

<div id="loading-bar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:var(--blue);padding:8px 20px;align-items:center;gap:10px;color:#fff;font-size:12px">
  <div style="width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>
  กำลังบันทึก/โหลดข้อมูล...
</div>
<div id="error-msg" style="display:none;background:#fef2f2;border-bottom:2px solid #fecaca;padding:10px 28px;font-size:12px;color:#dc2626"></div>
<div class="nav">
  <button class="nav-btn active" onclick="setTab('summary',this)">📊 สรุปรายเดือน</button>
  <button class="nav-btn" onclick="setTab('txn',this)">📋 รายการซื้อขาย</button>
</div>

<div class="content" id="content"></div>

<script>
// ════════════════════════════════════════
// ⚙️ ใส่ URL ของ Apps Script ที่ Deploy แล้ว
// ════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzvtMt5ZyWAvuritQ4lL0tkf-R9mPJW02Sw8mHeGpQEeVcDudDXA7G6UVJdGilJvtda/exec';

// ══════════════════════════════
// STATE
// ══════════════════════════════
let MONTHLY = { 2025:[], 2026:[] };
let txns = [];
let isLoading = false;
let activeTab='summary', sumYear=2026, txnYear=2026,
    txnFilter='all', collapsedMonths=new Set(), editId=null;

// ══════════════════════════════
// API HELPERS
// ══════════════════════════════
async function apiGet(action) {
  const url = `${API_URL}?action=${action}`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  const res = await fetch(proxy, {signal: AbortSignal.timeout(15000)});
  return res.json();
}
async function apiPost(body) {
  let url = `${API_URL}?action=${body.action}`;
  if (body.data) url += `&data=${encodeURIComponent(JSON.stringify(body.data))}`;
  if (body.id)   url += `&id=${body.id}`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  const res = await fetch(proxy, {signal: AbortSignal.timeout(15000)});
  try { return res.json(); } catch(e) { return {ok:true}; }
}

// คำนวณ MONTHLY จากรายการซื้อขายอัตโนมัติ + expense จาก Sheet
function calcMonthlyFromTxns(txnList, expenseData) {
  const result = { 2025: {}, 2026: {} };
  // Sum profit by sell month
  txnList.forEach(t => {
    if (!t.sell || !t.selldate) return;
    const d = new Date(t.selldate);
    if (isNaN(d)) return;
    const yr = d.getFullYear();
    const mon = d.getMonth(); // 0-based
    if (!result[yr]) result[yr] = {};
    if (!result[yr][mon]) result[yr][mon] = { profit: 0, expense: 0, expNote: '' };
    result[yr][mon].profit += (t.sell - t.buy);
  });

  // Month labels
  const labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Merge expense from Sheet
  [2025, 2026].forEach(yr => {
    const expArr = expenseData[yr] || [];
    expArr.forEach((m, i) => {
      if (!result[yr][i]) result[yr][i] = { profit: 0, expense: 0, expNote: '' };
      result[yr][i].expense = m.expense || 0;
      result[yr][i].expNote = m.expNote || '';
    });
  });

  // Convert to array format
  const monthly = {};
  [2025, 2026].forEach(yr => {
    const maxMon = yr === new Date().getFullYear() ? new Date().getMonth() : 11;
    monthly[yr] = [];
    for (let i = 0; i <= maxMon; i++) {
      const d = result[yr][i] || { profit: 0, expense: 0, expNote: '' };
      monthly[yr].push({
        m: `${labels[i]} ${String(yr).slice(2)}`,
        profit: Math.round(d.profit),
        expense: d.expense,
        expNote: d.expNote
      });
    }
  });
  return monthly;
}

// Load all data from Google Sheet
async function loadAll() {
  showLoading(true);
  try {
    const [m, t] = await Promise.all([apiGet('getMonthly'), apiGet('getTxns')]);
    if (t.txns) txns = t.txns;
    // คำนวณ MONTHLY จากรายการซื้อขายอัตโนมัติ
    if (t.txns) MONTHLY = calcMonthlyFromTxns(t.txns, m.monthly || {});
    else if (m.monthly) MONTHLY = m.monthly;
  } catch(e) {
    showError('ไม่สามารถเชื่อมต่อ Google Sheet ได้ กรุณาตรวจสอบ API_URL');
  }
  showLoading(false);
  renderGrand();
  renderContent();
}

function showLoading(v) {
  isLoading = v;
  const el = document.getElementById('loading-bar');
  if(el) el.style.display = v ? 'flex' : 'none';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  if(el){ el.textContent = msg; el.style.display = 'block'; }
}

async function saveTxns_remote() {} // not used — individual ops below

// ── Helpers ──
const fi  = n=>n==null?'—':Math.round(n).toLocaleString('th-TH');
const fd = s=>{
  if(!s||s===''||s===null)return'—';
  const str=String(s);
  const m=str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m)return m[3]+'/'+m[2]+'/'+m[1];
  return str;
};
const sgn = n=>n>0?'pos':n<0?'neg':'neu';
const spp = n=>n>0?'+':'';

// ── Grand bar ──
function renderGrand(){
  const d25=MONTHLY[2025], d26=MONTHLY[2026];
  const net25=d25.reduce((a,m)=>a+m.profit-m.expense,0);
  const net26=d26.reduce((a,m)=>a+m.profit-m.expense,0);
  const hold=txns.filter(t=>!t.sell).reduce((a,t)=>a+t.buy,0);
  document.getElementById('grand-bar').innerHTML=`
    <div class="gc"><div class="gc-label">กำไรสุทธิ 2025</div><div class="gc-val blue">+${fi(net25)}</div></div>
    <div class="gc"><div class="gc-label">กำไรสุทธิ 2026 (ถึงปัจจุบัน)</div><div class="gc-val blue">+${fi(net26)}</div></div>
    <div class="gc"><div class="gc-label">รวม 2 ปี</div><div class="gc-val green">+${fi(net25+net26)}</div></div>
    <div class="gc"><div class="gc-label">ทุนในมือ (ถืออยู่)</div><div class="gc-val">${fi(hold)}</div></div>`;
}

// ── Summary ──

// All months combined for chart
function getAllMonths(){
  const all=[];
  [2025,2026].forEach(yr=>{
    MONTHLY[yr].forEach(m=>all.push({...m,yr}));
  });
  return all;
}

function renderSummary(){
  const data=MONTHLY[sumYear];
  const totP=data.reduce((a,m)=>a+m.profit,0);
  const totE=data.reduce((a,m)=>a+m.expense,0);
  const totN=totP-totE;

  // Current month card
  const now=new Date();
  const curMonIdx=now.getMonth(); // 0-based
  const curYr=now.getFullYear();
  let curMon=null;
  if(curYr===sumYear&&curMonIdx<data.length) curMon=data[curMonIdx];
  else if(curYr>sumYear) curMon=data[data.length-1]; // last month if past year
  else curMon=data[data.length-1];

  let h=`<div class="ytabs">
    <button class="ybtn ${sumYear===2025?'active':''}" onclick="sumYear=2025;renderContent()">2025</button>
    <button class="ybtn ${sumYear===2026?'active':''}" onclick="sumYear=2026;renderContent()">2026</button>
  </div>
  <div class="sum-row">
    <div class="scard"><div class="scard-label">กำไรเดือนนี้ (${curMon?curMon.m:'—'})</div>
      <div class="scard-val blue">${curMon&&curMon.profit?'+'+fi(curMon.profit):'—'}</div>
      ${curMon&&curMon.expense?`<div style="font-size:11px;color:var(--red);margin-top:3px">จ่าย -${fi(curMon.expense)}</div>`:''}
    </div>
    <div class="scard"><div class="scard-label">คงเหลือเดือนนี้</div>
      <div class="scard-val ${curMon?sgn(curMon.profit-curMon.expense):''}">
        ${curMon?spp(curMon.profit-curMon.expense)+fi(curMon.profit-curMon.expense):'—'}
      </div>
    </div>
    <div class="scard"><div class="scard-label">รวมสุทธิปี ${sumYear}</div><div class="scard-val ${sgn(totN)}">${spp(totN)}${fi(totN)}</div></div>
    <div class="scard"><div class="scard-label">เดือนที่ดีที่สุด</div>
      <div class="scard-val" style="font-size:14px">${data.filter(m=>m.profit>0).reduce((a,m)=>m.profit>a.profit?m:a,{profit:0,m:'—'}).m}</div>
    </div>
  </div>`;

  // ── Vertical bar chart (all months Jan25→now) ──
  const allM=getAllMonths().filter(m=>m.profit>0||m.yr<curYr||(m.yr===curYr&&MONTHLY[m.yr].indexOf(m)<=curMonIdx));
  const maxP=Math.max(...allM.map(m=>m.profit),1);
  const chartH=180;

  h+=`<div class="vchart-box">
    <div class="vchart-title">กำไรรายเดือน — Jan 25 ถึงปัจจุบัน</div>
    <div style="position:relative">
      <div style="position:absolute;left:0;top:0;bottom:28px;width:40px">`;
  // Y axis gridlines: 0, 50k, 100k
  [0,50000,100000].forEach(v=>{
    const top=chartH-(v/maxP)*chartH;
    h+=`<div style="position:absolute;top:${top}px;right:0;font-size:8px;color:var(--text4);text-align:right;transform:translateY(-50%)">${v===0?'0':v/1000+'k'}</div>`;
  });
  h+=`</div>
      <div style="margin-left:44px;overflow-x:auto">
        <div class="vchart-inner" style="height:${chartH+28}px">`;

  allM.forEach(m=>{
    const barH=maxP>0?(m.profit/maxP)*chartH:0;
    const isNet=m.expense>0;
    const netH=maxP>0?((m.profit-m.expense)/maxP)*chartH:barH;
    const isCurrentM=(m.m===( curMon?curMon.m:''));
    const barColor=isCurrentM?'#1d4ed8':m.yr===2026?'#3b82f6':'#93c5fd';
    h+=`<div class="vchart-bar-wrap">
      <div class="vchart-bar-space">
        <div class="vchart-bar" style="height:${barH.toFixed(1)}px;background:${barColor}" title="${m.m}: +${fi(m.profit)}">
          <div class="vchart-bar-val">${m.profit>=50000?fi(m.profit/1000)+'k':''}</div>
          ${isNet?`<div style="position:absolute;bottom:0;left:0;right:0;height:${Math.max(0,barH-netH).toFixed(1)}px;background:rgba(220,38,38,.35);border-radius:4px 4px 0 0"></div>`:''}
        </div>
      </div>
      <div class="vchart-bar-label">${m.m}</div>
    </div>`;
  });

  h+=`</div></div></div>
    <div style="display:flex;gap:14px;margin-top:10px;font-size:10px;color:var(--text3)">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:#93c5fd;border-radius:2px;display:inline-block"></span>2025</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:#3b82f6;border-radius:2px;display:inline-block"></span>2026</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:#1d4ed8;border-radius:2px;display:inline-block"></span>เดือนปัจจุบัน</span>
    </div>
  </div>`;

  // Table (unchanged)
  h+=`<div style="overflow:auto;margin-bottom:20px"><table class="month-tbl">
    <thead><tr>
      <th>เดือน</th><th>กำไร</th><th>รายจ่ายอื่นๆ</th><th>คงเหลือสุทธิ</th><th>สะสม YTD</th><th>หมายเหตุ</th>
    </tr></thead><tbody>`;
  let cum2=0;
  data.forEach(m=>{
    const net=m.profit-m.expense;cum2+=net;
    h+=`<tr>
      <td>${m.m}</td>
      <td class="${m.profit?'pos':'neu'}">${m.profit?'+'+fi(m.profit):'—'}</td>
      <td class="${m.expense?'neg':'neu'}">${m.expense?'-'+fi(m.expense):'—'}</td>
      <td class="${sgn(net)}" style="font-weight:600">${spp(net)}${fi(net)}</td>
      <td class="${sgn(cum2)}">${spp(cum2)}${fi(cum2)}</td>
      <td style="font-size:11px;color:var(--text4);text-align:left">${m.expNote||'—'}</td>
    </tr>`;
  });
  h+=`</tbody><tfoot><tr>
    <td>รวมปี ${sumYear}</td>
    <td class="pos">+${fi(totP)}</td>
    <td class="${totE?'neg':'neu'}">${totE?'-'+fi(totE):'—'}</td>
    <td class="${sgn(totN)}" style="font-weight:700">${spp(totN)}${fi(totN)}</td>
    <td></td><td></td>
  </tr></tfoot></table></div>`;
  return h;
}

// ── Transaction ──


function renderTxn(){
  const yr=txnYear;
  const allData=txns.filter(t=>t.year===yr).sort((a,b)=>(a.buydate||'').localeCompare(b.buydate||''));
  const sold=allData.filter(t=>t.sell!=null);
  const hold=allData.filter(t=>t.sell==null);
  const totP=sold.reduce((a,t)=>a+(t.sell-t.buy),0);
  const holdV=hold.reduce((a,t)=>a+t.buy,0);
  // Apply filter
  const data = txnFilter==='hold' ? allData.filter(t=>!t.sell) : allData;

  let h=`<div class="ytabs">
    <button class="ybtn ${txnYear===2025?'active':''}" onclick="txnYear=2025;collapsedMonths=new Set();renderContent()">2025</button>
    <button class="ybtn ${txnYear===2026?'active':''}" onclick="txnYear=2026;collapsedMonths=new Set();renderContent()">2026</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <div class="scard" style="min-width:110px"><div class="scard-label">รายการทั้งหมด</div><div class="scard-val">${allData.length}</div></div>
    <div class="scard" style="min-width:110px"><div class="scard-label">ขายแล้ว</div><div class="scard-val green">${sold.length}</div></div>
    <div class="scard" style="min-width:110px"><div class="scard-label">📦 ถืออยู่</div><div class="scard-val" style="color:#d97706">${hold.length}</div></div>
    <div class="scard" style="min-width:140px"><div class="scard-label">กำไรจากรายการ</div><div class="scard-val blue">+${fi(totP)}</div></div>
    <div class="scard" style="min-width:130px"><div class="scard-label">ทุนถืออยู่</div><div class="scard-val">${fi(holdV)}</div></div>
  </div>
  <div class="filter-bar">
    <button class="fbtn ${txnFilter==='all'?'active':''}" onclick="txnFilter='all';renderContent()">ทั้งหมด (${allData.length})</button>
    <button class="fbtn ${txnFilter==='hold'?'hold-active':''}" onclick="txnFilter='hold';renderContent()">📦 ยังไม่ขาย (${hold.length})</button>
  </div>
  <div class="toolbar">
    <button class="btn-blue" onclick="openForm()">+ เพิ่มรายการ</button>
    <button class="btn-out" onclick="exportCSV()">⬇ Export CSV</button>
  </div>
  <div class="form-box" id="form-panel">
    <div class="fg">
      <div class="field"><label>หมวด</label>
        <select id="f-cat">
          <option value="bag">👜 กระเป๋า</option>
          <option value="watch">⌚ นาฬิกา</option>
          <option value="acc">💍 เครื่องประดับ/อื่นๆ</option>
        </select>
      </div>
      <div class="field" style="grid-column:span 2"><label>ชื่อสินค้า</label>
        <input id="f-name" placeholder="เช่น Horsebit 23, Submariner 2019">
      </div>
      <div class="field"><label>หมายเหตุ/รุ่น</label><input id="f-note" placeholder="รายละเอียดเพิ่มเติม"></div>
      <div class="field"><label>ราคาซื้อ (฿)</label><input id="f-buy" type="number" placeholder="0"></div>
      <div class="field"><label>วันที่ซื้อ</label><input id="f-buydate" type="date"></div>
      <div class="field"><label>ราคาขาย (฿)</label><input id="f-sell" type="number" placeholder="ว่างไว้ = ยังไม่ขาย"></div>
      <div class="field"><label>วันที่ขาย</label><input id="f-selldate" type="date"></div>
    </div>
    <div class="fa">
      <button class="btn-out" onclick="closeForm()">ยกเลิก</button>
      <button class="btn-blue" onclick="saveItem()">💾 บันทึก</button>
    </div>
  </div>
  <div class="edit-hint">💡 <span>คลิกที่ราคาขาย หรือวันที่ขาย</span> เพื่อแก้ไขได้เลยในตาราง</div>`;

  if(!data.length){
    h+=`<div style="text-align:center;padding:40px;color:var(--text4);font-size:14px">ไม่มีรายการในปี ${yr} — กด + เพิ่มรายการ</div>`;
    return h;
  }

  h+=`<div class="txn-wrap"><table class="txn-tbl"><thead><tr>
    <th>สินค้า</th><th>หมวด</th><th>ราคาซื้อ</th><th>วันที่ซื้อ</th>
    <th>ราคาขาย</th><th>วันที่ขาย</th><th>วัน</th><th>กำไร</th><th>%</th><th>สถานะ</th><th></th>
  </tr></thead><tbody>`;

  // Group by month first
  const monthGroups={};
  data.forEach(t=>{
    const mon=t.buydate?t.buydate.substring(0,7):'nodate';
    if(!monthGroups[mon])monthGroups[mon]=[];
    monthGroups[mon].push(t);
  });
  const months=Object.keys(monthGroups).sort();

  months.forEach(mon=>{
    const items=monthGroups[mon];
    const ml=mon!=='nodate'?new Date(mon+'-01').toLocaleDateString('th-TH',{month:'long',year:'numeric'}):'ไม่ระบุวันที่';
    const isCollapsed=collapsedMonths.has(mon);
    const monSold=items.filter(x=>x.sell!=null);
    const monProfit=monSold.reduce((a,x)=>a+(x.sell-x.buy),0);
    h+=`<tr class="mth-sep" style="cursor:pointer" onclick="toggleMonth('${mon}');event.stopPropagation()">
      <td colspan="11" style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px">
        <span style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;transition:transform .2s;display:inline-block;transform:rotate(${isCollapsed?'0':'90'}deg)">▶</span>
          <span>${ml}</span>
          <span style="font-size:10px;color:var(--text4)">${items.length} รายการ · ขาย ${monSold.length}</span>
        </span>
        ${monProfit>0?`<span style="font-size:11px;color:var(--green);font-weight:600">+${fi(monProfit)} ฿</span>`:''}
      </td>
    </tr>`;
    if(isCollapsed) return; // skip items for this month

    items.forEach(t=>{
    const p=t.sell!=null?t.sell-t.buy:null;
    const pct=p!=null?(p/t.buy)*100:null;
    const d1=t.buydate?new Date(t.buydate):null;
    const d2=t.selldate?new Date(t.selldate):t.sell?new Date():null;
    const days=d1&&d2?Math.round((d2-d1)/86400000):null;
    const tag=t.cat==='bag'?'<span class="tag tag-bag">BAG</span>':
               t.cat==='watch'?'<span class="tag tag-watch">WATCH</span>':
               '<span class="tag tag-acc">ACC</span>';

    // Inline editable cells
    const sellCell = t.sell!=null
      ? `<span class="editable" onclick="startEdit(${t.id},'sell',this)">${fi(t.sell)}</span>`
      : `<span class="editable" onclick="startEdit(${t.id},'sell',this)" style="color:var(--text4)">คลิกใส่ราคา</span>`;
    const sdateCell = t.selldate
      ? `<span class="editable" onclick="startEdit(${t.id},'selldate',this)">${fd(t.selldate)}</span>`
      : `<span class="editable" onclick="startEdit(${t.id},'selldate',this)" style="color:var(--text4)">คลิกใส่วันที่</span>`;

    h+=`<tr>
      <td><div class="iname">${t.name}</div>${t.note?`<div class="isub">${t.note}</div>`:''}</td>
      <td>${tag}</td>
      <td style="color:var(--text2)">${fi(t.buy)}</td>
      <td style="color:var(--text4)">${fd(t.buydate)}</td>
      <td>${sellCell}</td>
      <td>${sdateCell}</td>
      <td style="color:var(--text4)">${days!=null?days:'—'}</td>
      <td class="${p==null?'neu':p===0?'neu':sgn(p)}">${p==null?'ถืออยู่':p===0?'เท่าทุน':spp(p)+fi(p)}</td>
      <td class="${pct==null?'neu':sgn(pct)}">${pct==null?'—':(pct===0?'0.0':spp(pct)+pct.toFixed(1))+'%'}</td>
      <td>${t.sell!=null?'<span class="s-sold">SOLD</span>':'<span class="s-hold">HOLD</span>'}</td>
      <td><button class="del-btn" onclick="delItem(${t.id})">✕</button></td>
    </tr>`;
    }); // end items.forEach
  }); // end months.forEach

  const totB=allData.reduce((a,t)=>a+t.buy,0);
  const totS=sold.reduce((a,t)=>a+t.sell,0);
  h+=`</tbody><tfoot><tr>
    <td>รวม ${data.length} รายการ (ขาย ${sold.length} / ถือ ${hold.length})</td>
    <td></td><td>${fi(totB)}</td><td></td>
    <td>${fi(totS)||'—'}</td><td></td><td></td>
    <td class="${sgn(totP)}">${spp(totP)}${fi(totP)}</td>
    <td></td><td></td><td></td>
  </tr></tfoot></table></div>`;
  return h;
}

// ── Inline edit ──
function startEdit(id, field, el){
  const t=txns.find(x=>x.id===id);
  if(!t)return;
  const isDate=field==='selldate';
  const cur=t[field];
  const inp=document.createElement('input');
  inp.className='inline-input';
  inp.type=isDate?'date':'number';
  if(isDate&&cur)inp.value=cur;
  else if(!isDate&&cur)inp.value=cur;
  inp.style.width=isDate?'130px':'90px';
  el.replaceWith(inp);
  inp.focus();
  async function commit(){
    const val=inp.value;
    if(isDate){
      t.selldate=val||null;
    } else {
      t.sell=parseFloat(val)||null;
      if(t.sell&&!t.selldate){
        t.selldate=new Date().toISOString().split('T')[0];
      }
    }
    showLoading(true);
    await apiPost({action:'updateTxn',data:{id:t.id,sell:t.sell,selldate:t.selldate}});
    showLoading(false);
    renderContent();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter')inp.blur();
    if(e.key==='Escape'){saveTxns();renderContent();}
  });
}

// ── Toggle month ──
function toggleMonth(mon){
  if(collapsedMonths.has(mon))collapsedMonths.delete(mon);
  else collapsedMonths.add(mon);
  renderContent();
}

// ── State / Tab ──

function setTab(t,el){
  activeTab=t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderContent();
}
function renderContent(){
  document.getElementById('content').innerHTML=
    activeTab==='summary'?renderSummary():renderTxn();
  renderGrand();
}

// ── Form ──
function openForm(){document.getElementById('form-panel').classList.add('open');}
function closeForm(){
  document.getElementById('form-panel').classList.remove('open');
  ['f-name','f-note','f-buy','f-buydate','f-sell','f-selldate'].forEach(id=>{
    const e=document.getElementById(id);if(e)e.value='';
  });
}
async function saveItem(){
  const name=document.getElementById('f-name').value.trim();
  const buy=parseFloat(document.getElementById('f-buy').value)||0;
  if(!name||!buy){alert('กรุณากรอกชื่อและราคาซื้อ');return;}
  const obj={
    year:txnYear,
    cat:document.getElementById('f-cat').value,
    name,buy,note:document.getElementById('f-note').value.trim(),
    buydate:document.getElementById('f-buydate').value,
    sell:parseFloat(document.getElementById('f-sell').value)||null,
    selldate:document.getElementById('f-selldate').value||null,
  };
  showLoading(true);
  const res = await apiPost({action:'saveTxn',data:obj});
  if(res.ok){ obj.id=res.id; txns.push(obj); closeForm(); await loadAll(); }
  else alert('บันทึกไม่สำเร็จ: '+res.error);
  showLoading(false);
}
async function delItem(id){
  if(!confirm('ลบรายการนี้?'))return;
  showLoading(true);
  const res = await apiPost({action:'deleteTxn',id});
  if(res.ok){ txns=txns.filter(t=>t.id!==id); await loadAll(); }
  else alert('ลบไม่สำเร็จ: '+res.error);
  showLoading(false);
}
async function saveTxns() {} // data saved per-operation to Sheet

// ── Export ──
function exportCSV(){
  let csv='\uFEFFหมวด,ชื่อ,หมายเหตุ,ราคาซื้อ,วันที่ซื้อ,ราคาขาย,วันที่ขาย,กำไร,%กำไร\n';
  txns.filter(t=>t.year===txnYear).sort((a,b)=>(a.buydate||'').localeCompare(b.buydate||'')).forEach(t=>{
    const p=t.sell!=null?t.sell-t.buy:null;
    const pct=p!=null?(p/t.buy*100).toFixed(1):'';
    csv+=`${t.cat},"${t.name}","${t.note||''}",${t.buy},${t.buydate||''},${t.sell||''},${t.selldate||''},${p!=null?p:''},${pct}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`luxury_${txnYear}.csv`;a.click();
  URL.revokeObjectURL(url);
}


// ── Init ──
loadAll();  // Load from Google Sheet on start
